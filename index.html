<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jogo de adivinhação </title>
    
         <style>
            .corpoDapagina{
                font-family: Arial, sans-serif;
                background-color: rgb(148,182,53);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            h1{
                color: #333;

            }
            .container{
                text-align: center;
                background-color: #fff;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px rgba(0, 0, 0, 0,1);
            }

            input[type="number"]{
               padding: 10px;
               font-size: 16px;
               width: 50px;
               margin-botton: 10px
            }
                    
        
         </style>

    </head
    
    <body class=" CorpoDaPagina">
        
            <div class="container">

               <h1>&#128564;Jogo de adivinhação &#128565;</h1>
               <p>Tente adivinhar o número secreto entre 1 e 100</p>

               <input type="number" id="TXTPalpite" min="1" max="100"/>
               <button id="BTNAdivinhar">Adivinhar</button>
            
            
        
             
            </div>
    </body>
</html>
